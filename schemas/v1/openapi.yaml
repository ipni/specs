openapi: 3.0.3
info:
  title: IPNI HTTP API
  description: The Interplanetary Network Indexer (IPNI) HTTP query API.
  version: 0.0.1
paths:
  /cid/{cid}:
    get:
      description: Finds provider records for a given CID by extracting its multihash.
      parameters:
        - name: cid
          in: path
          description: The string representation of the CID.
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Cascade'
      responses:
        '200':
          description: At least one provider was found successfully.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/FindResponse'
              examples:
                providerRecords:
                  $ref: '#/components/examples/JsonFindResponse'
            'application/x-ndjson':
              schema:
                $ref: '#/components/schemas/ProviderRecord'
              examples:
                providerRecords:
                  $ref: '#/components/examples/NDJsonProviderRecords'
        '400':
          description: The given request is not valid.
          content:
            text/plain: { }
        '404':
          description: No results were found for the given CID.
        '500':
          description: Failure occurred while processing the request.
          content:
            text/plain: { }
  /cid:
    options:
      description: Returns permitted communication options for lookup by CID.
      responses:
        '204':
          $ref: '#/components/responses/FindOptions'
  /multihash/{multihash}:
    get:
      description: Finds provider records for a given multihash
      parameters:
        - name: multihash
          in: path
          description: The base58 or hex string representation of the multihash.
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Cascade'
      responses:
        '200':
          description: At least one provider was found successfully.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/FindResponse'
              examples:
                providerRecords:
                  $ref: '#/components/examples/JsonFindResponse'
            'application/x-ndjson':
              schema:
                $ref: '#/components/schemas/ProviderRecord'
              examples:
                providerRecords:
                  $ref: '#/components/examples/NDJsonProviderRecords'
        '400':
          description: The given request is not valid.
          content:
            text/plain: { }
        '404':
          description: No results were found for the given multihash.
        '500':
          description: Failure occurred while processing the request.
          content:
            text/plain: { }
  /multihash:
    options:
      description: Returns permitted communication options for lookup by multihash.
      responses:
        '204':
          $ref: '#/components/responses/FindOptions'
    post:
      description: Batch finds provider records for a given set of multihashes
      requestBody:
        description: Callback payload
        required: true
        content:
          'application/json':
            schema:
              $ref: '#/components/schemas/FindResponse'
            examples:
              providerRecords:
                $ref: '#/components/examples/JsonFindResponseMultiple'
      responses:
        '200':
          description: At least one provider was found successfully.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/FindResponse'
        '400':
          description: The given request is not valid.
          content:
            text/plain: { }
        '404':
          description: No results were found for any of the given multihashs.
        '500':
          description: Failure occurred while processing the request.
          content:
            text/plain: { }
  /sync/status:
    get:
      description: Lists live sync status for all publishers currently tracked by the indexer.
      responses:
        '200':
          description: Sync status was found for at least one publisher.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/SyncStatusMap'
              examples:
                syncStatuses:
                  $ref: '#/components/examples/SyncStatusMapResponse'
        '204':
          description: No sync status is currently tracked for any publisher.
        '500':
          description: Failure occurred while processing the request.
          content:
            text/plain: { }
  /sync/status/{peerID}:
    get:
      description: Returns the live sync status for a single publisher, identified by its libp2p peer ID.
      parameters:
        - name: peerID
          in: path
          description: The string representation of the publisher's libp2p peer ID.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Sync status was found for the given publisher.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/SyncStatus'
              examples:
                syncStatus:
                  $ref: '#/components/examples/SyncStatusResponse'
        '204':
          description: No sync status is currently tracked for the given publisher.
        '400':
          description: The given peer ID could not be decoded.
          content:
            text/plain: { }
components:
  schemas:
    FindResponse:
      type: array
      items:
        $ref: '#/components/schemas/MultihashResults'
    MultihashResults:
      type: array
      items:
        type: object
        properties:
          Multihash:
            type: string
            description: base64 string representation of the queried multihash
          ProviderResults:
            type: array
            items:
              $ref: '#/components/schemas/ProviderRecord'
    ProviderRecord:
      type: object
      properties:
        ContextID:
          type: string
          description: base64 encoded context ID.
        Metadata:
          type: string
          description: base64 encoded metadata.
        Provider:
          type: object
          properties:
            ID:
              type: string
              description: encoded libp2p peer ID of the provider.
            Addrs:
              type: array
              items:
                type: string
                description: string representation of the provider multiaddr.
    FindRequest:
      type: object
      properties:
        Multihashes:
          type: array
          description: the list of multihashes for which to find providers.
          items:
            type: string
            description: base64 string representation of the multihash.
    SyncStatusMap:
      type: object
      description: |
        Sync statuses keyed by publisher peer ID; each value is the sync status
        for that publisher.
      additionalProperties:
        $ref: '#/components/schemas/SyncStatus'
    SyncStatus:
      type: object
      description: |
        Live sync progress for a single publisher. Reflects one main provider
        (the advertisement's Provider) at a time; extended providers are not
        tracked. Each phase carries a current run while active and a bounded
        history of recent completed runs, at most ten per phase. Fields are
        omitted when empty.
      properties:
        Provider:
          type: string
          description: Encoded libp2p peer ID of the main provider for the tracked advertisements.
        Scan:
          $ref: '#/components/schemas/SyncScanRun'
        ScanHistory:
          type: array
          items:
            $ref: '#/components/schemas/SyncScanRun'
        Processing:
          $ref: '#/components/schemas/SyncProcessingRun'
        ProcessingHistory:
          type: array
          items:
            $ref: '#/components/schemas/SyncProcessingRun'
        Download:
          $ref: '#/components/schemas/SyncDownloadRun'
        DownloadHistory:
          type: array
          items:
            $ref: '#/components/schemas/SyncDownloadRun'
    SyncScanRun:
      type: object
      description: Progress of a single advertisement-chain scan.
      properties:
        StartTime:
          type: string
          format: date-time
          description: RFC3339 time at which the scan started.
        EndTime:
          type: string
          format: date-time
          description: RFC3339 time at which the scan ended; omitted while the scan is ongoing.
        Ongoing:
          type: boolean
          description: True while the scan is in progress; omitted once it has completed.
        Elapsed:
          type: string
          description: Duration string; time elapsed so far if ongoing, or total duration if completed, for example "15s".
        Error:
          type: string
          description: Error message if the scan ended in failure.
        AdsScanned:
          type: integer
          description: Number of advertisements walked during the chain scan.
        HeadAd:
          type: string
          description: String CID of the head advertisement at which the scan began.
        CurrentAd:
          type: string
          description: String CID of the advertisement most recently walked.
    SyncProcessingRun:
      type: object
      description: Progress of processing a synced advertisement stack.
      properties:
        StartTime:
          type: string
          format: date-time
          description: RFC3339 time at which processing started.
        EndTime:
          type: string
          format: date-time
          description: RFC3339 time at which processing ended; omitted while processing is ongoing.
        Ongoing:
          type: boolean
          description: True while processing is in progress; omitted once it has completed.
        Elapsed:
          type: string
          description: Duration string; time elapsed so far if ongoing, or total duration if completed.
        Error:
          type: string
          description: Error message if processing ended in failure.
        AdsProcessed:
          type: integer
          description: Number of advertisements processed so far, including the one currently in progress.
        AdsTotal:
          type: integer
          description: Total number of advertisements to process in this run.
        AdsLeft:
          type: integer
          description: Advertisements remaining; present only while AdsProcessed is less than AdsTotal.
        CurrentAd:
          type: string
          description: String CID of the advertisement currently being processed.
        ErrorCount:
          type: integer
          description: Number of advertisements that failed to ingest during this run.
    SyncDownloadRun:
      type: object
      description: |
        Progress of downloading advertisement entry data. One download run is
        shared across all advertisements processed within a single processing
        run, so its counts accumulate over the whole stack.
      properties:
        StartTime:
          type: string
          format: date-time
          description: RFC3339 time at which the download run started.
        EndTime:
          type: string
          format: date-time
          description: RFC3339 time at which the download run ended; omitted while the run is ongoing.
        Ongoing:
          type: boolean
          description: True while the download run is in progress; omitted once it has completed.
        Elapsed:
          type: string
          description: Duration string; time elapsed so far if ongoing, or total duration if completed.
        Error:
          type: string
          description: Error message if the download run ended in failure.
        BytesDownloaded:
          type: integer
          format: int64
          description: Total downloaded entry-block bytes.
        EntryChunkCount:
          type: integer
          description: Number of EntryChunk blocks indexed; HAMT entries are not chunked and do not contribute.
        ChunkMultihashCount:
          type: integer
          format: int64
          description: Multihashes indexed from EntryChunk blocks.
        HamtMultihashCount:
          type: integer
          format: int64
          description: Multihashes indexed from HAMT entries.
        MultihashCount:
          type: integer
          format: int64
          description: Total multihashes indexed; the sum of ChunkMultihashCount and HamtMultihashCount.
  examples:
    NDJsonProviderRecords:
      summary: Streaming provider records response
      value: |
        {"ContextID":"aXBmcy1kaHQtY2FzY2FkZQ==","Metadata":"gBI=","Provider":{"ID":"12D3KooWHVXoJnv2ifmr9K6LWwJPXxkfvzZRHzjiTZMvybeTnwPy","Addrs":["/ip4/145.40.89.101/tcp/4001","/ip4/145.40.89.101/tcp/4002/ws","/ip4/145.40.89.101/udp/4001/quic","/ip6/2604:1380:45f1:d800::1/tcp/4001","/ip6/2604:1380:45f1:d800::1/tcp/4002/ws","/ip6/2604:1380:45f1:d800::1/udp/4001/quic"]}}
        
